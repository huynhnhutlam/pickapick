name: pickle_pick
description: "A professional Pickleball Court Booking and eCommerce application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  auto_route: ^9.0.0
  
  # Networking
  dio: ^5.5.0
  
  # Persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Models & JSON
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  
  # UI & Design
  google_fonts: ^6.1.0
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  logging: ^1.2.0
  badges: ^3.1.2
  supabase_flutter: ^2.12.2
  qr_flutter: ^4.1.0
  image_picker: ^1.2.1
  firebase_core: ^4.6.0
  firebase_analytics: ^12.0.4
  firebase_performance: ^0.11.2
  fpdart: ^1.2.0
  skeletonizer: ^2.1.3
  flutter_staggered_animations: ^1.1.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: 2.4.11
  auto_route_generator: ^9.0.0
  freezed: 2.4.7
  json_serializable: 6.8.0
  riverpod_generator: 2.4.0
  hive_generator: 2.0.1
  mocktail: ^1.0.5
  checks: ^0.3.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
